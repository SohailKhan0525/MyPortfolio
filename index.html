<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MOHD ZAHEER UDDIN | AI Engineer</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>
<body>
  <div id="preloader">
    <div class="cyber-loader"></div>
    <div class="loader-text" data-text="INITIALIZING SYSTEM...">INITIALIZING SYSTEM...</div>
  </div>

  <script>
    (function () {
      var hidden = false;
      function doHide() {
        if (hidden) return;
        hidden = true;
        var el = document.getElementById('preloader');
        if (el) {
          el.style.opacity = '0';
          setTimeout(function () { el.style.display = 'none'; }, 600);
        }
        window._preloaderDone = true;
        if (typeof window._onPreloaderDone === 'function') window._onPreloaderDone();
      }
      var tries = 0;
      var interval = setInterval(function () {
        tries++;
        if (document.readyState === 'complete' || tries >= 100) {
          clearInterval(interval);
          doHide();
        }
      }, 50);
      setTimeout(doHide, 8000);
      window.addEventListener('error', function (e) {
        var t = e.target;
        if (t && (t.tagName === 'SCRIPT' || t.tagName === 'LINK')) doHide();
      }, true);
    })();
  </script>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
